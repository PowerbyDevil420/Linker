        // --- Intent Logic ---
        function generateBrowserIntent(url, browserId) {
            let normalizedUrl = url.trim();
            if (!/^https?:\/\//i.test(normalizedUrl)) {
                normalizedUrl = 'https://' + normalizedUrl;
            }
            if (browserId === 'default') return normalizedUrl;
            
            const browserConf = state.browsers.find(b => b.id === browserId);
            if (!browserConf || !browserConf.package) return normalizedUrl;

            try {
                const urlObj = new URL(normalizedUrl);
                const scheme = urlObj.protocol.replace(':', '');
                const hostAndPath = `${urlObj.host}${urlObj.pathname}${urlObj.search}${urlObj.hash}`;
                return `intent://${hostAndPath}#Intent;scheme=${scheme};package=${browserConf.package};end;`;
            } catch (e) {
                return url;
            }
        }

                        timestamp: new Date().toISOString()
                    };
                    state.history.unshift(newHist);
                    supabaseClient.from('history').insert({ id: newHist.id, user_key: newHist.userKey, link_id: newHist.linkId, title: newHist.title, url: newHist.url, timestamp: newHist.timestamp }).then(({error}) => { if (error) console.error("History Insert Error:", error); });
                    
                    if (state.history.length > 500) state.history = state.history.slice(0, 500);

                    if (state.role === 'user' && state.userKey) {
                        const user = state.users.find(u => u.key === state.userKey);
                        if (user) {
                            if (!user.usage) user.usage = {};
                            user.usage[link.id] = (user.usage[link.id] || 0) + 1;
                        }
                    }

                    
                    const finalUrl = generateBrowserIntent(link.url, state.selectedBrowser);
                    window.open(finalUrl, '_blank');
                    const container = document.getElementById('links-container');
                    if (container) container.innerHTML = renderLinksContent();
                    else render();
                }
            } else if (action === 'close-context-menu') {
                state.activeContextMenu = null;
                render();
            } else if (action === 'toggle-pin') {
                const linkId = target.dataset.id;
                const link = state.links.find(l => l.id === linkId);
                if (link) {
                    if (state.role === 'admin') {
                        link.isPinned = !link.isPinned; supabaseClient.from('links').update({ is_pinned: link.isPinned }).eq('id', link.id).then();
                    } else if (state.role === 'user' && state.userKey) {
                        const user = state.users.find(u => u.key === state.userKey);
                        if (user) {
                            if (!user.pinned) user.pinned = [];
                            if (user.pinned.includes(link.id)) {
                                user.pinned = user.pinned.filter(id => id !== link.id); supabaseClient.from('user_pinned_links').delete().match({ user_key: state.userKey, link_id: link.id }).then();
                            } else {
                                user.pinned.push(link.id); supabaseClient.from('user_pinned_links').insert({ user_key: state.userKey, link_id: link.id }).then();
                            }
                        }
                    }
                    state.activeContextMenu = null;
                    
                    render();
                }
            } else if (action === 'nav') {
                state.currentView = target.dataset.view;
                render();
            } else if (action === 'del-link') {
                state.confirmDialog = {
                    title: 'Delete Link',
                    message: 'Are you sure you want to delete this link permanently?',
                    action: 'confirm-del-link',
                    dataId: target.dataset.id
                };
                render();
            } else if (action === 'confirm-del-link') {
                state.links = state.links.filter(l => l.id !== state.confirmDialog.dataId);
                supabaseClient.from('links').delete().eq('id', state.confirmDialog.dataId).then();
                state.activeContextMenu = null;
                state.confirmDialog = null;
                
                render();
            } else if (action === 'del-attr') {
                const type = target.dataset.type;
                const val = target.dataset.val;
                state.attributes[type] = state.attributes[type].filter(x => x !== val);
                supabaseClient.from('attributes').delete().match({ type: type, value: val }).then();
                if (state.filters[type] === val) state.filters[type] = '';
                
                render();
            } else if (action === 'copy-user-key') {
                const key = target.dataset.key;
                navigator.clipboard.writeText(key).then(() => {
                    const originalHTML = target.innerHTML;
                    target.innerHTML = '<i class="fas fa-check"></i> Copied';
                    setTimeout(() => {
                        if (document.body.contains(target)) {
                            target.innerHTML = originalHTML;
                        }
                    }, 2000);
                }).catch(() => {
                    alert('Failed to copy key.');
                });
            } else if (action === 'delete-user') {
                state.confirmDialog = {
                    title: 'Delete User',
                    message: 'Are you sure you want to delete this user? All their pinned and history data will be lost.',
                    action: 'confirm-delete-user',
                    dataId: target.dataset.key
                };
                render();
            } else if (action === 'confirm-delete-user') {
                state.users = state.users.filter(u => u.key !== state.confirmDialog.dataId);
                supabaseClient.from('users').delete().eq('key', state.confirmDialog.dataId).then();
                state.confirmDialog = null;
                
                render();
            } else if (action === 'delete-browser') {
                state.confirmDialog = {
                    title: 'Delete Browser',
                    message: 'Are you sure you want to remove this browser?',
                    action: 'confirm-delete-browser',
                    dataId: target.dataset.id
                };
                render();
            } else if (action === 'confirm-delete-browser') {
                state.browsers = state.browsers.filter(b => b.id !== state.confirmDialog.dataId);
                supabaseClient.from('browsers').delete().eq('id', state.confirmDialog.dataId).then();
                if (state.selectedBrowser === state.confirmDialog.dataId) {
                    state.selectedBrowser = 'default';
                    localStorage.setItem('linker_browser', 'default');
                }
                state.confirmDialog = null;
                
                render();
            } else if (action === 'close-confirm-dialog') {
                state.confirmDialog = null;
                render();
            } else if (action === 'view-user-activity') {
                state.viewingUserActivity = target.dataset.key;
                render();
            } else if (action === 'close-user-activity') {
                state.viewingUserActivity = null;
                render();
            } else if (action === 'logout') {
                setRole(null);
            } else if (action === 'open-add-modal') {
                state.isAddModalOpen = true;
                state.addModalData = { device: '', country: '', software: '', update: '', url: '' };
                state.activeAddModalDropdown = null;
                render();
            } else if (action === 'close-add-modal') {
                state.isAddModalOpen = false;
                render();
            } else if (action === 'toggle-add-modal-dropdown') {
                const type = target.dataset.type;
                state.activeAddModalDropdown = state.activeAddModalDropdown === type ? null : type;
                render();
            } else if (action === 'set-add-modal-attr') {
                const type = target.dataset.type;
                state.addModalData[type] = target.dataset.val;
                state.activeAddModalDropdown = null;
                render();
            } else if (action === 'toggle-filter-dropdown') {
                const type = target.dataset.type;
                state.activeFilterDropdown = state.activeFilterDropdown === type ? null : type;
                render();
            } else if (action === 'set-custom-filter') {
                const type = target.dataset.type;
                const val = target.dataset.val;
                state.filters[type] = state.filters[type] === val ? '' : val; 
                state.activeFilterDropdown = null;
                render();
            } else if (action === 'open-attr-editor') {
                state.adminEditAttr = target.dataset.type;
                render();
            } else if (action === 'close-attr-editor') {
                state.adminEditAttr = null;
                render();
            } else if (action === 'quick-add-attr') {
                const type = target.dataset.type;
                const input = document.getElementById('add-val-' + type);
                const val = input ? input.value.trim() : '';
                if (val) {
                    let dup = false;
                    let existingVal = val;
                    for (let v of state.attributes[type]) {
                        if (v.toLowerCase() === val.toLowerCase()) {
                            dup = true;
                            existingVal = v;
                        }
                    }
                    if (!dup) {
                        state.attributes[type].push(val);
                supabaseClient.from('attributes').insert({ type: type, value: val }).then();
                        
                    }
                    render();
                }
            } else if (action === 'quick-add-modal-attr') {
                const type = target.dataset.type;
                const input = document.getElementById('add-modal-val-' + type);
                const val = input ? input.value.trim() : '';
                if (val) {
                    let dup = false;
                    let existingVal = val;
                    for (let v of state.attributes[type]) {
                        if (v.toLowerCase() === val.toLowerCase()) {
                            dup = true;
                            existingVal = v;
                        }
                    }
                    if (!dup) {
                        state.attributes[type].push(val);
                supabaseClient.from('attributes').insert({ type: type, value: val }).then();
                        
                    }
                    state.addModalData[type] = existingVal;
                    state.activeAddModalDropdown = null;
                    render();
                }
            } else if (action === 'toggle-browser-popup') {
                state.activeBrowserDropdown = !state.activeBrowserDropdown;
                state.activeFilterDropdown = null;
                render();
            } else if (action === 'select-browser') {
                state.selectedBrowser = target.dataset.val;
                localStorage.setItem('linker_browser', state.selectedBrowser);
                state.activeBrowserDropdown = false;
                render();
            }
        });

        window.filterDropdownOptions = function(input, listId) {
            const query = input.value.toLowerCase();
            const list = document.getElementById(listId);
            if (!list) return;
            const items = list.querySelectorAll('button[data-val]');
            items.forEach(item => {
                const val = item.dataset.val || '';
                const textSpan = item.querySelector('span:last-child');
                const itemText = textSpan ? textSpan.textContent.toLowerCase() : '';
                if (val.toLowerCase().includes(query) || itemText.includes(query)) {
                    item.style.setProperty('display', 'flex', 'important');
                } else {
                    item.style.setProperty('display', 'none', 'important');
                }
            });
        };

        document.getElementById('app').addEventListener('submit', (e) => {
            const target = e.target.closest('[data-action]');
            if (!target) return;
            e.preventDefault();
            const action = target.dataset.action;
            
            if (action === 'login') {
                const errorEl = document.getElementById('loginError');
                
                if (state.requireAdminPIN) {
                    const pin = document.getElementById('adminPin').value.trim();
                    if (pin === 'SaGoRsaRdeR2003') {
                        state.requireAdminPIN = false;
                        setRole('admin');
                    } else {
                        errorEl.textContent = 'Invalid PIN.';
                        errorEl.classList.remove('hidden');
                    }
                    return;
                }

                const key = document.getElementById('activationKey').value.trim();
                
                if (key === '01922755197') {
                    state.requireAdminPIN = true;
                    render();
                } else {
                    const user = state.users.find(u => u.key === key);
                    if (user) {
                        if (user.isUsed) {
                            errorEl.textContent = 'This key has already been used.';
                            errorEl.classList.remove('hidden');
                        } else {
                            user.isUsed = true;
                            supabaseClient.from('users').update({ is_used: true }).eq('key', user.key).then();
                            // sync removed saveState()
                            setRole('user', user.key);
                        }
                    } else {
                        errorEl.textContent = 'Invalid key. Please try again.';
                        errorEl.classList.remove('hidden');
                    }
                }
            } else if (action === 'add-attr') {
                const type = target.dataset.type;
                const val = target.elements['val'].value.trim();
                let dup = false;
                for(let v of state.attributes[type]) {
                    if (v.toLowerCase() === val.toLowerCase()) dup = true;
                }
                if (val && !dup) {
                    state.attributes[type].push(val);
                supabaseClient.from('attributes').insert({ type: type, value: val }).then();
                    
                    render();
                }
                target.reset();
            } else if (action === 'create-user') {
                const name = target.elements['userName']?.value.trim();
                if (!name) return;
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+';
                let key = '';
                for ( let i = 0; i < 25; i++ ) key += chars.charAt(Math.floor(Math.random() * chars.length));
                
                const newUser = {
                    key,
                    name,
                    isUsed: false,
                    isBanned: false,
                    createdAt: new Date().toISOString()
                };
                state.users.unshift(newUser);
                supabaseClient.from('users').insert({ key: newUser.key, name: newUser.name, is_used: newUser.isUsed, is_banned: newUser.isBanned, created_at: newUser.createdAt }).then();
                
                render();
            } else if (action === 'create-browser') {
                const bName = target.elements['browserName'].value.trim();
                const bPkg = target.elements['browserPackage'].value.trim();
                if (bName && bPkg) {
                    const id = bName.toLowerCase().replace(/[^a-z0-9]/g, '-');
                    const newBrowser = {
                        id,
                        name: bName,
                        iconType: 'fas',
                        iconClass: 'fa-globe',
                        package: bPkg
                    };
                    state.browsers.push(newBrowser);
                    supabaseClient.from('browsers').insert({ id: newBrowser.id, name: newBrowser.name, icon_type: newBrowser.iconType, icon_class: newBrowser.iconClass, package: newBrowser.package }).then();
                    if (state.selectedBrowser === 'default') {
                        state.selectedBrowser = id;
                        localStorage.setItem('linker_browser', id);
                    }
                    
                    render();
                }
            } else if (action === 'add-link') {
                e.preventDefault();
                const url = target.elements['url'].value.trim();
                const device = target.elements['device'].value;
                const country = target.elements['country'].value;
                const software = target.elements['software'].value;
                const update = target.elements['update'].value;

                if (!url || !device || !country || !software || !update) {
                    alert('Please make sure to fill in the URL and select all attributes (Region, Device, Software, Update).');
                    return;
                }

                const newLink = {
                    id: generateId(),
                    title: url.replace(/^https?:\/\//, '').split('/')[0], // Extract domain as title
                    url, device, country, software, update, usageCount: 0, isPinned: false,
                    createdAt: new Date().toISOString()
                };
                state.links.unshift(newLink);
                supabaseClient.from('links').insert({
                    id: newLink.id, title: newLink.title, url: newLink.url, device: newLink.device,
                    country: newLink.country, software: newLink.software, update_attr: newLink.update,
                    usage_count: 0, is_pinned: false, created_at: newLink.createdAt
                }).then();
                
                
                state.isAddModalOpen = false;
                state.addModalData = { device: '', country: '', software: '', update: '', url: '' };
                state.currentView = 'home';
                render();
            }
        });

        document.getElementById('app').addEventListener('input', (e) => {
            if (e.target.id === 'searchInput') {
                state.searchQuery = e.target.value.toLowerCase();
                const container = document.getElementById('links-container');
                if (container) container.innerHTML = renderLinksContent();
            }
        });

        document.getElementById('app').addEventListener('change', (e) => {
            if (e.target.id === 'browserSelect') {
                state.selectedBrowser = e.target.value;
                localStorage.setItem('linker_browser', state.selectedBrowser);
                render();
            }
        });

        // --- Render System ---
        function escapeHTML(str) {
            if (!str) return '';
            return str.toString().replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
        }

        let scrollState = new Map();
        function render() {
            const app = document.getElementById('app');
            if (state.isLoading) {
                app.innerHTML = '<div class="h-full flex items-center justify-center flex-col bg-pink-50"><i class="fas fa-spinner fa-spin text-pink-500 text-3xl mb-4"></i><span class="text-stone-500 font-bold">Connecting to Cloud...</span></div>';
                return;
            }

            if (state.role === 'user' && state.userKey) {
                const userExists = state.users.some(u => u.key === state.userKey);
                if (!userExists) {
                    setRole(null);
                    return;
                }
            }

            scrollState.clear();
            document.querySelectorAll('.overflow-y-auto, .overflow-auto').forEach((el, index) => {
                const key = el.id || 'scroll-' + index;
                scrollState.set(key, el.scrollTop);
            });
            
            let htmlContent = renderDashboard();
            if (!state.role) {
                htmlContent += `
                    <div class="fixed inset-0 z-[100] flex items-center justify-center bg-white/40 backdrop-blur-lg p-4 pointer-events-auto">
                        <div class="absolute inset-0 bg-pink-900/10 mix-blend-multiply"></div>
                        ${renderLoginBox()}
                    </div>
                `;
            }
            app.innerHTML = htmlContent;

            document.querySelectorAll('.overflow-y-auto, .overflow-auto').forEach((el, index) => {
                const key = el.id || 'scroll-' + index;
                if (scrollState.has(key)) el.scrollTop = scrollState.get(key);
            });
            document.querySelectorAll('[id^="dropdown-list-"]').forEach((el) => {
                const type = el.id.replace('dropdown-list-', '');
                if (state.dropdownScrolls[type] !== undefined) {
                    el.scrollTop = state.dropdownScrolls[type];
                }
            });
        }

        // --- Views ---
        function renderLoginBox() {
            return `
                <div class="w-full max-w-md p-8 rounded-3xl bg-white/90 border border-pink-100 shadow-2xl relative z-[110]">
                        <h1 class="text-xl sm:text-2xl font-black tracking-tight text-center text-pink-950 mb-8 leading-snug">
                            ${state.requireAdminPIN ? 'Enter Admin PIN' : 'Enter the secret key received from the admin'}
                        </h1>
                        
                        <form data-action="login" class="space-y-4">
                            <div>
                                ${state.requireAdminPIN ? `
                                    <input type="password" id="adminPin" placeholder="Enter PIN..." class="w-full px-5 py-3.5 bg-pink-50/50 border border-pink-200 rounded-xl text-stone-800 placeholder-stone-400 focus:outline-none focus:border-pink-400 focus:ring-4 focus:ring-pink-100 transition-all font-bold text-center tracking-widest" required>
                                ` : `
                                    <input type="text" id="activationKey" placeholder="Activation Key..." class="w-full px-5 py-3.5 bg-pink-50/50 border border-pink-200 rounded-xl text-stone-800 placeholder-stone-400 focus:outline-none focus:border-pink-400 focus:ring-4 focus:ring-pink-100 transition-all font-bold text-center tracking-widest" required>
                                `}
                            </div>
                            <p id="loginError" class="text-rose-500 text-sm text-center font-bold hidden"></p>
                            <button type="submit" class="w-full py-4 px-4 bg-pink-500 hover:bg-pink-400 text-white rounded-xl font-bold transition-all shadow-lg shadow-pink-500/30 text-base">
                                Authenticate
                            </button>
                        </form>

                        ${!state.requireAdminPIN ? `
                        <div class="mt-6 text-center">
                            <a href="https://wa.me/8801946620424?text=Please%20give%20me%20a%20secret%20key" target="_blank" class="inline-flex items-center justify-center gap-2 text-emerald-600 hover:text-emerald-700 font-bold text-[13px] hover:underline transition-colors pb-1">
                                <i class="fab fa-whatsapp text-lg"></i> Contact the Admin
                            </a>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function renderBottomNav() {
            const navItems = [
                { id: 'home', icon: 'fa-home', label: 'Home' },
                { id: 'history', icon: 'fa-history', label: 'History' },
                { id: 'pinned', icon: 'fa-thumbtack', label: 'Pinned' },
            ];

            if (state.role === 'admin') {
                navItems.push({ id: 'members', icon: 'fa-user-shield', label: 'Members' });
            }

            return navItems.map(item => `
                <button data-action="nav" data-view="${item.id}" class="flex flex-col items-center justify-center w-full h-full ${state.currentView === item.id ? 'text-pink-600' : 'text-stone-400 hover:text-stone-600'} transition-all ${state.currentView === item.id ? 'bg-pink-50/50' : ''}">
                    <i class="fas ${item.icon} text-[18px] mb-1.5 leading-none ${state.currentView === item.id ? 'scale-110 drop-shadow-sm' : ''} transition-transform"></i>
                    <span class="text-[10px] font-bold">${item.label}</span>
                </button>
            `).join('');
        }

        function renderLinkCard(link) {
            let isPinned = false;
            if (state.role === 'admin') {
                isPinned = link.isPinned;
            } else if (state.role === 'user' && state.userKey) {
                const user = state.users.find(u => u.key === state.userKey);
                if (user && user.pinned) {
                    isPinned = user.pinned.includes(link.id);
                }
            }

            return `
                <div class="bg-white border border-pink-100 p-2.5 sm:p-3 rounded-xl shadow-sm transition-all group flex flex-row items-center justify-between gap-3 relative overflow-hidden">
                    <div class="absolute -top-6 -right-6 w-32 h-32 bg-gradient-to-bl from-pink-50/80 to-transparent rounded-full pointer-events-none"></div>
                    
                    <div class="absolute top-2 right-2 flex gap-1.5 z-20">
                        <button data-action="toggle-pin" data-id="${link.id}" class="w-6 h-6 flex items-center justify-center rounded-full bg-stone-50 hover:bg-pink-100 transition-colors text-[10px] ${isPinned ? 'text-pink-600 bg-pink-50' : 'text-stone-400'}">
                            <i class="fas fa-thumbtack"></i>
                        </button>
                        ${state.role === 'admin' ? `
                        <button data-action="del-link" data-id="${link.id}" class="w-6 h-6 flex items-center justify-center rounded-full bg-stone-50 hover:bg-rose-100 text-stone-400 hover:text-rose-600 transition-colors text-[10px]">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                        ` : ''}
                    </div>

                    <div class="flex-1 min-w-0 z-10 flex flex-col justify-center mt-4">

                        </div>
                        <div class="flex flex-wrap items-center gap-1 mb-1">
                            <span class="bg-blue-50/80 text-blue-700 text-[8px] px-1 py-0.5 rounded font-bold uppercase tracking-wider border border-blue-100/50 flex items-center gap-1"><i class="fas fa-mobile-alt opacity-70"></i> ${escapeHTML(link.device)}</span>
                            <span class="bg-emerald-50/80 text-emerald-700 text-[8px] px-1 py-0.5 rounded font-bold uppercase tracking-wider border border-emerald-100/50 flex items-center gap-1">${getFlag(link.country)} ${escapeHTML(link.country)}</span>
                            <span class="bg-purple-50/80 text-purple-700 text-[8px] px-1 py-0.5 rounded font-bold uppercase tracking-wider border border-purple-100/50 flex items-center gap-1">${getSoftwareIcon(link.software)} ${escapeHTML(link.software)}</span>
                            <span class="bg-orange-50/80 text-orange-700 text-[8px] px-1 py-0.5 rounded font-bold uppercase tracking-wider border border-orange-100/50 flex items-center gap-1"><i class="fas fa-sync-alt opacity-70"></i> ${escapeHTML(link.update)}</span>
                        </div>

                            ${(() => {
                                let usesText = '';
                                if (state.role === 'admin') {
                                    if (link.usageCount && link.usageCount > 0) {
                                        usesText = `Global Uses: ${link.usageCount}`;
                                    }
                                } else if (state.role === 'user' && state.userKey) {
                                    const user = state.users.find(u => u.key === state.userKey);
                                    const count = user?.usage?.[link.id] || 0;

                                }
                                return '';
                            })()}
                        </div>

                        <div class="flex items-center z-10 shrink-0 relative mt-4">
                        <button data-action="open-link" data-id="${link.id}" class="inline-flex items-center justify-center gap-1.5 bg-pink-900 text-white px-3 sm:px-4 h-9 sm:h-10 rounded-xl font-bold text-[12px] hover:bg-pink-800 transition-colors shadow-md shadow-pink-900/10 active:scale-95 border border-pink-950">
                            Run <i class="fas fa-play text-[9px]"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        function renderLinksContent() {
            let visibleLinks = state.links;
            if (state.filters.device) visibleLinks = visibleLinks.filter(l => l.device === state.filters.device);
            if (state.filters.country) visibleLinks = visibleLinks.filter(l => l.country === state.filters.country);
            if (state.filters.software) visibleLinks = visibleLinks.filter(l => l.software === state.filters.software);
            if (state.filters.update) visibleLinks = visibleLinks.filter(l => l.update === state.filters.update);

            if (state.searchQuery) {
                const q = state.searchQuery;
                visibleLinks = visibleLinks.filter(l => 
                    l.title.toLowerCase().includes(q) || 
                    l.url.toLowerCase().includes(q)
                );
            }

            const topBar = `
                <div class="flex justify-between items-center pt-4 px-4 sm:px-6 pb-2">
                    <div class="text-[11px] font-bold text-stone-500 uppercase tracking-widest bg-white/60 px-3 py-1.5 rounded-full border border-pink-100 shadow-sm flex items-center gap-1.5">
                        <i class="fas fa-link text-stone-400"></i> Total Links: <span class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full">${visibleLinks.length}</span>

                                    <input type="url" name="url" placeholder="https://..." value="${escapeHTML(state.addModalData.url || '')}" oninput="state.addModalData.url = this.value" class="w-full bg-pink-50/50 border border-pink-100 rounded-2xl px-5 py-4 text-sm outline-none focus:ring-2 focus:ring-pink-300 text-stone-900 font-mono placeholder-stone-400 transition-all" required>
                                </div>
                                <button type="submit" class="w-full bg-pink-500 hover:bg-pink-400 text-white py-4 rounded-2xl text-[14px] font-black tracking-widest uppercase shadow-[0_8px_20px_rgba(236,72,153,0.3)] hover:shadow-[0_8px_25px_rgba(236,72,153,0.4)] transition-all mt-2 active:scale-95 flex items-center justify-center gap-2">
                                    Upload <i class="fas fa-arrow-right text-xs"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            `;
        }

        // Placeholders for the new Views
        function renderPlaceholder(icon, title, desc) {
            return `
                <div class="h-full flex flex-col items-center justify-center p-6 text-center w-full relative z-10 bg-pink-50/30 animate-fadein">
                    <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center border-[6px] border-pink-100/50 shadow-xl shadow-pink-200/50 mb-8 text-pink-400">
                        <i class="fas ${icon} text-4xl mt-1 ml-1"></i>
                    </div>
                    <h2 class="text-3xl font-black text-pink-950 mb-3 tracking-tight">${title}</h2>
                    <p class="text-stone-500 font-medium max-w-sm leading-relaxed text-sm">${desc}</p>
                </div>
            `;
        }

        function renderPinnedView() {
            let pinnedLinks = [];
            if (state.role === 'admin') {
                pinnedLinks = state.links.filter(l => l.isPinned);
            } else if (state.role === 'user' && state.userKey) {
                const user = state.users.find(u => u.key === state.userKey);
                if (user && user.pinned) {
                    pinnedLinks = state.links.filter(l => user.pinned.includes(l.id));
                }
            }

            if (pinnedLinks.length === 0) return renderPlaceholder('fa-thumbtack', 'No Pinned Records', 'Your favorite and most heavily accessed records will be pinned here for priority access.');

            return `
                <div class="flex-1 min-h-0 overflow-y-auto w-full px-4 pt-4 pb-32 sm:px-6 sm:pt-6 sm:pb-32" id="pinned-scroll">
                    <div class="max-w-3xl mx-auto space-y-4">
                        ${pinnedLinks.map(link => renderLinkCard(link)).join('')}
                    </div>
                </div>
            `;
        }

        function renderHistoryView() {
            let viewHistory = state.history;
            if (state.role !== 'admin') {
                viewHistory = state.history.filter(h => h.userKey === state.userKey);
            }
            
            if (viewHistory.length === 0) return renderPlaceholder('fa-history', 'Activity History', 'Your link clicking history, session audits, and recent activity will appear here.');

            return `
                <div class="flex-1 min-h-0 overflow-y-auto w-full px-4 pt-4 pb-32 sm:px-6 sm:pt-6 sm:pb-32" id="history-scroll">
                    <div class="max-w-3xl mx-auto space-y-4">
                        <div class="flex items-center justify-between mb-4 px-2">
                            <h3 class="text-stone-800 font-bold text-sm bg-stone-100 px-3 py-1.5 rounded-lg inline-flex items-center gap-2 border border-stone-200">
                                <i class="fas fa-history text-stone-500"></i> Recent Activity
                            </h3>
                            <div class="text-[10px] font-bold text-stone-400 bg-stone-50 px-2 py-1 rounded-md border border-stone-100">
                                ${viewHistory.length} records
                            </div>
                        </div>
                        ${viewHistory.map(item => {
                            const date = new Date(item.timestamp);
                            const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                            const link = state.links.find(l => l.id === item.linkId);
                            if (!link) return '';
                            return `
                                <div class="flex flex-col gap-1.5">
                                    <div class="pl-2 text-[10px] font-bold text-stone-400 uppercase tracking-widest flex items-center gap-1">
                                        <i class="far fa-clock"></i> Accessed at ${timeStr}
                                    </div>
                                    ${renderLinkCard(link)}
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function renderActiveView() {
            if (state.currentView === 'home') return renderHome();
            if (state.currentView === 'history') return renderHistoryView();
            if (state.currentView === 'pinned') return renderPinnedView();
            if (state.currentView === 'members') return renderAdmin();
            return renderHome();
        }

        function renderDashboard() {
            return `
                <div class="flex-1 flex flex-col h-full overflow-hidden w-full relative">
                    
                    <!-- Top App Bar -->
                    <nav class="h-16 bg-white border-b border-pink-100 flex items-center justify-between px-4 sm:px-6 shrink-0 w-full shadow-[0_2px_10px_rgba(0,0,0,0.02)] relative z-[60]">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 bg-pink-500 rounded-xl flex items-center justify-center shadow-inner shadow-pink-300">
                                <i class="fas fa-bolt text-white text-sm animate-pulse"></i>
                            </div>
                            <div class="hidden sm:block leading-tight">
                                <span class="text-lg font-black tracking-tight text-pink-950 block">Link<span class="text-pink-500">Router</span></span>
                                <span class="text-[9px] font-bold text-stone-400 uppercase tracking-widest block">Core Environment</span>
                            </div>
                        </div>
                        
                        <div class="flex flex-1 justify-end items-center gap-2 sm:gap-4 ml-4">
                            <div class="hidden md:flex items-center gap-2 bg-pink-50/80 px-3 py-1.5 rounded-full border border-pink-100 ml-1">
                                <div class="w-2 h-2 ${state.role === 'admin' ? 'bg-indigo-400' : 'bg-emerald-400'} rounded-full animate-pulse shadow-sm"></div>
                                <span class="text-[10px] font-black uppercase tracking-wider text-pink-900">${state.role === 'admin' ? 'Administrator' : 'Verified User'}</span>
                            </div>

                            <div class="relative w-[130px] sm:w-[150px]" id="browser-dropdown-wrapper">
                                <button data-action="toggle-browser-popup" class="w-full flex items-center justify-between bg-pink-50 hover:bg-pink-100 border border-pink-200 text-pink-900 py-2 sm:py-2.5 px-3 rounded-xl text-[10px] sm:text-xs font-bold shadow-sm focus:outline-none focus:ring-2 focus:ring-pink-300 cursor-pointer transition-colors max-w-full overflow-hidden">
                                     <div class="flex items-center gap-2 truncate">
                                        ${(() => {
                                            const activeB = state.browsers.find(b => b.id === state.selectedBrowser) || state.browsers[0];
                                            return `<i class="${activeB.iconType} ${activeB.iconClass} text-pink-500"></i>
                                            <span class="truncate">${escapeHTML(activeB.name)}</span>`;
                                        })()}
                                     </div>
                                     <i class="fas fa-chevron-${state.activeBrowserDropdown ? 'up' : 'down'} text-[10px] opacity-70 shrink-0"></i>
                                </button>
                                
                                ${state.activeBrowserDropdown ? `
                                    <div class="absolute top-full right-0 mt-2 w-full min-w-[150px] bg-white border border-pink-100 rounded-xl shadow-xl z-[100] animate-popup overflow-hidden p-1.5 font-sans max-h-64 overflow-y-auto">
                                        ${state.browsers.map(b => `
                                            <button data-action="select-browser" data-val="${b.id}" class="w-full text-left px-3 py-2.5 text-[11px] sm:text-xs font-bold transition-colors flex items-center gap-2.5 rounded-lg ${state.selectedBrowser === b.id ? 'bg-pink-50 text-pink-600' : 'text-stone-700 hover:bg-stone-50'}">
                                                <i class="${b.iconType} ${b.iconClass} w-4 justify-center flex text-sm ${b.id === 'chrome' ? 'text-yellow-500' : b.id === 'firefox' ? 'text-orange-500' : b.id === 'opera' ? 'text-red-600' : b.id === 'brave' ? 'text-orange-400' : b.id === 'duckduckgo' ? 'text-emerald-600' : b.id === 'tor' ? 'text-purple-600' : 'text-emerald-500'}"></i>
                                                <span class="truncate">${escapeHTML(b.name)}</span>
                                            </button>
                                        `).join('')}
                                    </div>
                                ` : ''}
                            </div>
                            
                            <div class="w-px h-5 bg-pink-100 mx-0.5 hidden sm:block"></div>

                            <button data-action="logout" class="p-1.5 sm:p-2 text-stone-400 hover:text-rose-500 hover:bg-rose-50 rounded-xl transition-colors flex items-center justify-center shrink-0 w-8 h-8 sm:w-9 sm:h-9" title="Sign Out">
                                <i class="fas fa-power-off text-xs sm:text-sm"></i>
                            </button>
                        </div>
                    </nav>

                    <!-- Main Content Area -->
                    <main class="flex-1 min-h-0 flex flex-col relative bg-white w-full z-40 overflow-hidden">
                        <div class="absolute inset-0 bg-pink-50/30 opacity-50 pointer-events-none z-0"></div>
                        <div id="main-view-container" class="w-full flex-1 min-h-0 flex flex-col relative z-10 overflow-hidden">
                            ${renderActiveView()}
                        </div>
                    </main>

                    <!-- Bottom Configurable Navigation -->
                    <nav class="bg-white border-t border-pink-100 flex justify-around items-stretch h-[calc(60px+env(safe-area-inset-bottom))] sm:h-[calc(70px+env(safe-area-inset-bottom))] pb-safe shrink-0 shadow-[0_-4px_20px_rgba(0,0,0,0.03)] z-30 w-full relative">
                        ${renderBottomNav()}
                    </nav>

                    <!-- Modal Root -->
                    <div id="modal-container">
                        ${renderModal()}
                        ${renderUserActivityModal()}
                        ${renderConfirmDialogModal()}
                    </div>
                </div>
            `;
        }

        // Initialize application
        async function initApp() {
            try {
                // Fetch all data
                const responses = await Promise.all([
                    supabaseClient.from('links').select('*'),
                    supabaseClient.from('users').select('*'),
                    supabaseClient.from('history').select('*').order('timestamp', { ascending: false }),
                    supabaseClient.from('browsers').select('*'),
                    supabaseClient.from('attributes').select('*'),
                    supabaseClient.from('user_pinned_links').select('*')
                ]);

                // Check for errors
                const errors = responses.filter(r => r.error).map(r => r.error.message);
                if (errors.length > 0) {
                    alert("Supabase Error(s): \n" + errors.join("\n") + "\n\nPlease ensure your database tables are created correctly and Row Level Security (RLS) is configured (or disabled for testing). Check the console for more details.");
                    console.error("Supabase Errors:", errors);
                }

                const [{ data: links }, { data: users }, { data: history }, { data: browsers }, { data: attrs }, { data: pinned }] = responses;

                if (attrs) {
                    const mappedAttrs = { device: [], country: [], software: [], update: [] };
                    attrs.forEach(a => {
                        if (mappedAttrs[a.type]) mappedAttrs[a.type].push(a.value);
                    });
                    state.attributes = mappedAttrs;
                }

                if (links) {
                    state.links = links.map(l => ({
                        id: l.id,
                        title: l.title,
                        url: l.url,
                        device: l.device,
                        country: l.country,
                        software: l.software,
                        update: l.update_attr,
                        usageCount: l.usage_count,
                        isPinned: l.is_pinned,
                        createdAt: l.created_at
                    }));
                }

                if (users) {
                    state.users = users.map(u => {
                        const uPins = pinned ? pinned.filter(p => p.user_key === u.key).map(p => p.link_id) : [];
                        return {
                            key: u.key,
                            name: u.name,
                            isUsed: u.is_used,
                            isBanned: u.is_banned,
                            createdAt: u.created_at,
                            pinned: uPins,
                            usage: {} // Optional: Aggregate usage inside history if needed, but array starts empty
                        };
                    });
                    
                    // Aggregate usage from history
                    if (history) {
                        history.forEach(h => {
                            const u = state.users.find(u => u.key === h.user_key);
                            if (u) {
                                u.usage[h.link_id] = (u.usage[h.link_id] || 0) + 1;
                            }
                        });
                    }
                }

                if (browsers && browsers.length > 0) {
                    state.browsers = browsers.map(b => ({
                        id: b.id,
                        name: b.name,
                        iconType: b.icon_type,
                        iconClass: b.icon_class,
                        package: b.package
                    }));
                }

                if (history) {
                    state.history = history.map(h => ({
                        id: h.id,
                        userKey: h.user_key,
                        linkId: h.link_id,
                        title: h.title,
                        url: h.url,
                        timestamp: h.timestamp
                    }));
                }
            } catch (err) {
                console.error("Error loading data from Supabase:", err);
            } finally {
                state.isLoading = false;
                render();
            }
        }

        initApp();
        /* Set up Realtime */ supabaseClient.channel('public-changes').on('postgres_changes', { event: '*', schema: 'public' }, payload => { initApp(); }).subscribe();
    </script>
</body>
</html>
